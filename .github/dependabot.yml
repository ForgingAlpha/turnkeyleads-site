version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    assignees:
      - "leosmigel"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "lockfile-only"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      security:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "major"
